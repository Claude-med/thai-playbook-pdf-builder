name: Bug report
description: แจ้งปัญหาการใช้งาน skill หรือ QA scripts
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: ปัญหาที่พบ
      description: อธิบายสิ่งที่เกิดขึ้นโดยไม่ใส่ข้อมูลส่วนตัว
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: วิธีทำให้เกิดปัญหา
      placeholder: Prompt, command, input shape และขั้นตอนแบบย่อ
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: ผลลัพธ์ที่คาดหวัง
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Python 3.13, Codex version
